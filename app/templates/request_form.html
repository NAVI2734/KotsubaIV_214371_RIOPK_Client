<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подать заявку</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            display: block;
            width: 100%;
            background: #28a745;
            color: white;
            font-size: 16px;
            padding: 10px;
            margin-top: 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Форма подачи заявки</h2>
    <form method="post" action="/request">
        <label for="full_name">ФИО:</label>
        <input type="text" id="full_name" name="full_name" required>

        <label for="age">Возраст:</label>
        <input type="number" id="age" name="age" required>

        <label for="category">Социальная категория:</label>
        <select id="category" name="category" required>
            <option value="" disabled selected hidden>Выберите категорию</option>
            <option value="пенсионер">Пенсионер</option>
            <option value="инвалид">Инвалид</option>
            <option value="многодетная семья">Многодетная семья</option>
            <option value="безработный">Безработный</option>
        </select>

        <label for="description">Описание запроса:</label>
        <textarea id="description" name="description" required></textarea>

        <button type="submit">Отправить заявку</button>
    </form>
</div>
</body>
</html>
