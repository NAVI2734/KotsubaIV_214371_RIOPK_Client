<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заявки клиентов - ЦСО</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            font-family: sans-serif;
            background-color: #f9f9f9;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        table {
            margin: 2rem auto;
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 0.75rem;
            text-align: left;
        }
        th {
            background-color: #ecf0f1;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Полученные заявки</h1>
    <table>
        <tr>
            <th>Пользователь</th>
            <th>ФИО</th>
            <th>Возраст</th>
            <th>Категория</th>
            <th>Описание</th>
        </tr>
        {% for r in all_requests %}
        <tr>
            <td>{{ r.username }}</td>
            <td>{{ r.full_name }}</td>
            <td>{{ r.age }}</td>
            <td>{{ r.category }}</td>
            <td>{{ r.description }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
